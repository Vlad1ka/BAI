<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="/css/style.css">
    <title>БАИ</title>
</head>
<body>
    <!-- Шапка -->
    <header class="header">
        <div class="header__container">
            <div class="header__container__logo">
                <img src="./img/лого.png" alt="logo">
                <p>Восточный экономический форум</p>
            </div>
            <div class="header__container__address">
                <p>г.Хабаровск ул.Сибирякова д.123</p>
            </div>
            <div class="header__container__social_media">
                <img src="./img/telegram.png" alt="telegram">
                <img src="./img/ok.png" alt="ok">
                <img src="./img/vk.png" alt="vk">
            </div>
        </div>
        <hr>
        <nav class="header__nav">
            <button class="header__nav__btn">Мероприятия</button>
            <button class="header__nav__btn">Контакты</button>
            <button class="header__nav__btn">Регистрация</button>
        </nav>
    </header>

    <!-- Слайдер -->

    <!-- Мероприятия -->
    <div class="events">
        <div class="events__title">
            <p>Мероприятия восточного экономического форума</p>
        </div>
    </div>
</body>
</html>
